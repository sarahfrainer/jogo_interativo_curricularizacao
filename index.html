<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Brusque</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ══════════ tela login ══════════ -->
<div class="screen active" id="sLogin">
  <div class="card">
    <div class="login-title">BEM-VINDO AO JOGO!</div>
    <input class="field" id="nome" type="text" placeholder="NOME (opcional)" maxlength="40" autocomplete="off">
    <select class="field" id="escola">
      <option value="" selected>ESCOLA (opcional)</option>
      <option>E.B.M. GETÚLIO VARGAS</option>
      <option>E.E.B. HERCÍLIO LUZ</option>
      <option>E.B.M. DOM JOÃO BECKER</option>
      <option>E.E.B. AUGUSTO ZIMMERMANN</option>
      <option>OUTRA ESCOLA</option>
    </select>
    <input class="field" id="idade" type="number" placeholder="IDADE (opcional)" min="4" max="18">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:20px;">
    <button class="btn-login" onclick="doLogin()">
      <span>🔑</span> ENTRAR COM LOGIN
    </button>
    <button class="btn-guest" onclick="startGame()">
      CONTINUAR SEM LOGIN
    </button>
  </div>
  </div>
</div>

<!-- ══════════ tela questão ══════════ -->
<div class="screen" id="sQuestion">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="q-top">
    <div class="q-bubble">
      <div class="q-num" id="qNum">1</div>
      <div class="q-text" id="qText">...</div>
    </div>
    <button class="sound-btn" onclick="readQ()" title="Ouvir">🔊</button>
  </div>
  <div class="options-grid" id="optGrid"></div>
</div>

<!-- ══════════ tela erro ══════════ -->
<div class="screen" id="sError">
  <div class="error-card">
    <div class="error-icon">😬</div>
    <div class="error-title">OPS! NÃO FOI DESSA VEZ...</div>
    <div class="error-msg-text" id="errorMsg">VOCÊ ERROU ESSA PERGUNTA.<br>MAS NÃO DESANIME, CONTINUE TENTANDO!</div>
    <button class="btn-green" onclick="nextAfterError()">CONTINUAR ➜</button>
  </div>
</div>

<!-- ══════════ tela resultado correto ══════════ -->
<div class="screen" id="sResult">
  <div class="result-card">
    <div class="result-title" id="rTitle">MUITO BEM!</div>
    <div class="result-score" id="rScore">VOCÊ ACERTOU 1 DE 1!</div>
    <div class="result-sub">PARABÉNS! 🎉</div>
    <div class="stars-row">
      <div class="star" id="st1">⭐</div>
      <div class="star" id="st2">⭐</div>
      <div class="star" id="st3">⭐</div>
    </div>
    <button class="btn-green" onclick="nextQuestion()">PRÓXIMA ➜</button>
    <div class="mascots">
      <div class="mascot">🐸</div>
      <div class="mascot">🦦</div>
      <div class="mascot">🦆</div>
    </div>
  </div>
</div>

<!-- ══════════ tela final ══════════ -->
<div class="screen" id="sEnd">
  <div class="result-card">
    <div class="end-title" id="endTitle">JOGO CONCLUÍDO! 🏁</div>
    <div class="end-total" id="endTotal">VOCÊ ACERTOU X DE Y PERGUNTAS!</div>
    <div class="end-medals" id="endMedals">🥇</div>
    <div class="stars-row" id="endStars"></div>
    <button class="btn-green" onclick="restartGame()">JOGAR NOVAMENTE</button>
    <button class="btn-orange" onclick="showScreen('sLogin')">TROCAR JOGADOR</button>
    <div class="mascots">
      <div class="mascot">🐸</div>
      <div class="mascot">🦦</div>
      <div class="mascot">🦆</div>
    </div>
  </div>
</div>


<script src="script.js"></script>
</body>
</html>
